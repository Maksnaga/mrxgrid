name: Deploy Storybook to NAS

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build Storybook
        run: npm run build-storybook

      - name: Deploy to NAS
        uses: easingthemes/ssh-deploy@v6
        with:
          SSH_PRIVATE_KEY: ${{ secrets.NAS_SSH_KEY }}
          REMOTE_HOST: ${{ secrets.NAS_HOST }}
          REMOTE_USER: ${{ secrets.NAS_USER }}
          REMOTE_PORT: ${{ secrets.NAS_SSH_PORT }}
          SOURCE: storybook-static/
          TARGET: /volume1/Web/mrxgrid/
          ARGS: -avz --delete
