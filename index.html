<!DOCTYPE html>
<html lang="">
  <head>
    <meta charset="UTF-8">
    <link rel="icon" href="/favicon.ico">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
    <title>Vite App</title>
    <style>
      /* Reset margins du user-agent et coupe le scroll global. La demo
         occupe exactement le viewport — c'est .app-shell__content qui
         scrolle, pas la page. Sans ce reset, le 8px de body margin pousse
         le 100vh hors viewport → on doit scroller pour voir le footer
         de la sidebar. */
      html,
      body {
        margin: 0;
        padding: 0;
        height: 100%;
        overflow: hidden;
      }

      body {
        font-family: var(--font-family, Roboto), sans-serif;
      }

      #app {
        height: 100%;
      }
    </style>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
