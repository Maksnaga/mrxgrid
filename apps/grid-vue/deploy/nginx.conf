# nginx config pour servir Storybook + App demo depuis le même container.
#
# Structure attendue dans le volume monté sur `/usr/share/nginx/html` :
#   /usr/share/nginx/html/
#   ├── mrxgrid/         ← Storybook (base /mrxgrid/)
#   └── mrxgrid-app/     ← Vite demo app (base /mrxgrid-app/)
#
# URLs servies :
#   https://maksnaga.myasustor.com/mrxgrid       → Storybook
#   https://maksnaga.myasustor.com/mrxgrid-app   → demo app

server {
  listen 80 default_server;
  server_name _;

  root /usr/share/nginx/html;
  index index.html;

  # Compression — gros gains sur les bundles JS/CSS de Storybook & Vite.
  gzip on;
  gzip_vary on;
  gzip_comp_level 6;
  gzip_min_length 1024;
  gzip_types
    text/plain
    text/css
    text/javascript
    application/javascript
    application/json
    application/wasm
    image/svg+xml;

  # Cache long sur les assets fingerprintés (vite/storybook ajoutent un hash).
  location ~* \.(js|css|woff2?|ttf|otf|eot|png|jpg|jpeg|gif|svg|ico|webp|wasm)$ {
    expires 1y;
    add_header Cache-Control "public, immutable";
    access_log off;
    try_files $uri =404;
  }

  # ----- App demo (Vite) ----------------------------------------------------
  location /mrxgrid-app/ {
    alias /usr/share/nginx/html/mrxgrid-app/;
    try_files $uri $uri/ /mrxgrid-app/index.html;
    add_header Cache-Control "no-cache, no-store, must-revalidate" always;
  }

  # ----- Storybook ----------------------------------------------------------
  location /mrxgrid/ {
    alias /usr/share/nginx/html/mrxgrid/;
    try_files $uri $uri/ /mrxgrid/index.html;
    add_header Cache-Control "no-cache, no-store, must-revalidate" always;
  }

  # Redirige la racine vers la demo (optionnel) — sinon 404.
  location = / {
    return 302 /mrxgrid-app/;
  }
}
