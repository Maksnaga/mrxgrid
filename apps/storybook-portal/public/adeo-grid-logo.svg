<svg viewBox="0 0 200 160" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="adeo grid">
  <!-- Soft rounded outer container -->
  <rect x="6" y="6" width="188" height="148" rx="14" fill="#ffffff" stroke="#d8dde2" stroke-width="2"/>

  <!-- Teal header band with rounded top corners -->
  <path d="M 18 8 L 182 8 Q 192 8 192 18 L 192 60 L 8 60 L 8 18 Q 8 8 18 8 Z" fill="#1ca6b6"/>

  <!-- Handwritten "adeo" text -->
  <text x="22" y="46" font-family="'Caveat', 'Brush Script MT', cursive" font-size="34" font-weight="600" fill="#ffffff" font-style="italic">adeo</text>

  <!-- Grid lines (4 cols × 3 rows below header) -->
  <g stroke="#dbe0e5" stroke-width="1.5">
    <!-- horizontal lines -->
    <line x1="8" y1="84" x2="192" y2="84"/>
    <line x1="8" y1="108" x2="192" y2="108"/>
    <line x1="8" y1="132" x2="192" y2="132"/>
    <!-- vertical lines -->
    <line x1="54" y1="60" x2="54" y2="148"/>
    <line x1="100" y1="60" x2="100" y2="148"/>
    <line x1="146" y1="60" x2="146" y2="148"/>
  </g>

  <!-- Cell content pills -->
  <rect x="150" y="68" width="36" height="10" rx="5" fill="#c8ced4"/>
  <rect x="60" y="92" width="36" height="10" rx="5" fill="#1ca6b6"/>
  <rect x="150" y="92" width="36" height="10" rx="5" fill="#7dccd5"/>
  <rect x="106" y="116" width="36" height="10" rx="5" fill="#c8ced4"/>
  <rect x="14" y="118" width="12" height="3" rx="1.5" fill="#cfd5db"/>
  <rect x="14" y="140" width="12" height="3" rx="1.5" fill="#cfd5db"/>
</svg>
